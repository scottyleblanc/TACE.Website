<svg width="680" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th  { font-size: 14px; font-weight: 500; fill: #0C447C; }
      .ts  { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .th-p { font-size: 14px; font-weight: 500; fill: #3C3489; }
      .ts-p { font-size: 12px; font-weight: 400; fill: #534AB7; }
      .th-g { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts-g { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .label { font-size: 11px; fill: #444441; }
    </style>
  </defs>

  <!-- ON-PREM container -->
  <rect x="30" y="30" width="280" height="490" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text class="th-g" x="170" y="56" text-anchor="middle" dominant-baseline="central">On-premises</text>

  <!-- Oracle server container -->
  <rect x="50" y="72" width="240" height="310" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-g" x="170" y="96" text-anchor="middle" dominant-baseline="central">Oracle server</text>

  <!-- Oracle DB -->
  <rect x="68" y="114" width="204" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-p" x="170" y="136" text-anchor="middle" dominant-baseline="central">Oracle database</text>
  <text class="ts-p" x="170" y="154" text-anchor="middle" dominant-baseline="central">ALTER USER runs here</text>

  <!-- Tomcat -->
  <rect x="68" y="190" width="204" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-p" x="170" y="212" text-anchor="middle" dominant-baseline="central">Tomcat</text>
  <text class="ts-p" x="170" y="230" text-anchor="middle" dominant-baseline="central">Properties file updated here</text>

  <!-- SSM Agent -->
  <rect x="68" y="266" width="204" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-p" x="170" y="288" text-anchor="middle" dominant-baseline="central">SSM agent</text>
  <text class="ts-p" x="170" y="306" text-anchor="middle" dominant-baseline="central">Receives Run Command</text>

  <!-- PowerShell module -->
  <rect x="68" y="342" width="204" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th-p" x="170" y="364" text-anchor="middle" dominant-baseline="central">PowerShell module</text>
  <text class="ts-p" x="170" y="382" text-anchor="middle" dominant-baseline="central">Executes rotation logic</text>

  <!-- SSM Agent to PowerShell arrow -->
  <line x1="170" y1="322" x2="170" y2="340" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Server manifest -->
  <rect x="50" y="420" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th-g" x="170" y="442" text-anchor="middle" dominant-baseline="central">Server manifest</text>
  <text class="ts-g" x="170" y="460" text-anchor="middle" dominant-baseline="central">Topology, windows, SSM targets</text>

  <!-- AWS container -->
  <rect x="370" y="30" width="280" height="490" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text class="th" x="510" y="56" text-anchor="middle" dominant-baseline="central">AWS</text>

  <!-- EventBridge -->
  <rect x="390" y="72" width="240" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="510" y="94" text-anchor="middle" dominant-baseline="central">EventBridge scheduler</text>
  <text class="ts" x="510" y="112" text-anchor="middle" dominant-baseline="central">Fires every 30 min</text>

  <!-- Lambda -->
  <rect x="390" y="168" width="240" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="510" y="190" text-anchor="middle" dominant-baseline="central">Lambda function</text>
  <text class="ts" x="510" y="208" text-anchor="middle" dominant-baseline="central">Rotation orchestrator</text>

  <!-- Secrets Manager -->
  <rect x="390" y="264" width="240" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="510" y="286" text-anchor="middle" dominant-baseline="central">Secrets Manager</text>
  <text class="ts" x="510" y="304" text-anchor="middle" dominant-baseline="central">AWSCURRENT / AWSPENDING</text>

  <!-- DynamoDB -->
  <rect x="390" y="360" width="240" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="510" y="382" text-anchor="middle" dominant-baseline="central">DynamoDB</text>
  <text class="ts" x="510" y="400" text-anchor="middle" dominant-baseline="central">Rotation lock table</text>

  <!-- SSM Run Command -->
  <rect x="390" y="456" width="240" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="510" y="478" text-anchor="middle" dominant-baseline="central">SSM Run Command</text>
  <text class="ts" x="510" y="496" text-anchor="middle" dominant-baseline="central">Invokes PowerShell on server</text>

  <!-- AWS internal arrows -->
  <line x1="510" y1="128" x2="510" y2="166" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="224" x2="510" y2="262" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="320" x2="510" y2="358" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="416" x2="510" y2="454" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Cross-boundary: SSM Run Command to SSM Agent -->
  <path d="M 390 484 L 340 484 L 340 294 L 274 294" fill="none" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)"/>
  <text class="label" x="343" y="476" text-anchor="start">HTTPS 443</text>

  <!-- Legend -->
  <rect x="50" y="536" width="12" height="12" rx="2" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="label" x="68" y="546" dominant-baseline="central">On-prem boundary</text>
  <rect x="50" y="556" width="12" height="12" rx="2" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="label" x="68" y="566" dominant-baseline="central">AWS boundary</text>
  <rect x="50" y="576" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="label" x="68" y="586" dominant-baseline="central">Components on server</text>
</svg>
